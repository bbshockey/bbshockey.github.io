  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const wrap    = document.getElementById('canvas-wrap');
    const loader  = document.getElementById('loader');
    const hint    = document.getElementById('hint');
    const isMobile = window.matchMedia('(max-width: 768px)').matches;

    if (isMobile) hint.textContent = 'tap to interact';

    // ── Renderer ──
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping       = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    wrap.appendChild(renderer.domElement);

    // ── Scene & Camera ──
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.01, 100);
    camera.position.set(-1.2, 1.4, 3.8);

    // ── Lights ──
    const ambient = new THREE.AmbientLight(0xffffff, 3.5);
    scene.add(ambient);

    // Front key — illuminates the face
    const key = new THREE.DirectionalLight(0xfff8f0, 3.0);
    key.position.set(1, 3, 6);
    scene.add(key);

    // Left fill
    const fill = new THREE.DirectionalLight(0xddeeff, 2.0);
    fill.position.set(-5, 2, 3);
    scene.add(fill);

    // Right fill
    const right = new THREE.DirectionalLight(0xfff0e0, 2.0);
    right.position.set(5, 2, 3);
    scene.add(right);

    // Top
    const top = new THREE.DirectionalLight(0xffffff, 1.5);
    top.position.set(0, 6, 2);
    scene.add(top);

    // Back fill — keeps the model lit when rotating
    const back = new THREE.DirectionalLight(0xfff5e8, 2.5);
    back.position.set(0, 2, -6);
    scene.add(back);

    // ── OrbitControls ──
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping    = true;
    controls.dampingFactor    = 0.06;
    controls.enableZoom       = true;
    controls.enablePan        = false;
    controls.minDistance      = 0.5;
    controls.maxDistance      = 8;
    controls.autoRotate       = true;
    controls.autoRotateSpeed  = 1.2;

    // Stop auto-rotate on user interaction, restart after 4s
    let rotateTimer;
    renderer.domElement.addEventListener('pointerdown', () => {
      controls.autoRotate = false;
      hint.style.opacity  = '0';
      clearTimeout(rotateTimer);
    });
    renderer.domElement.addEventListener('pointerup', () => {
      rotateTimer = setTimeout(() => { controls.autoRotate = true; }, 4000);
    });

    // ── Load model ──
    const gltfLoader = new GLTFLoader();
    gltfLoader.load('bjorn.glb', (gltf) => {
      const model = gltf.scene;

      // Center and scale
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale  = 2.0 / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      // Shift left on desktop so text sits comfortably on the right
      if (!isMobile) model.position.x -= 1.1;

      scene.add(model);

      // Point camera at model center
      controls.target.set(isMobile ? 0 : model.position.x, 0, 0);
      controls.update();

      // Hide loader
      loader.classList.add('hidden');
    },
    undefined,
    (err) => console.error('GLB load error:', err));

    // ── Resize ──
    window.addEventListener('resize', () => {
      const w = wrap.clientWidth, h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ── Render loop ──
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
